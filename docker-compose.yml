services:
  api:
    build:
      context: ./backend
    container_name: ot_at_home_api
    environment:
      APP_NAME: ot@home
      APP_ENV: local
      DATABASE_URL: postgresql+psycopg://ot_user:ot_password@db:5432/ot_at_home
      SECRET_KEY: change-this-secret-key-before-production
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      FIRST_ADMIN_THAI_ID: ""
      FIRST_ADMIN_PASSWORD: ""
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app

  db:
    image: postgres:16-alpine
    container_name: ot_at_home_db
    environment:
      POSTGRES_DB: ot_at_home
      POSTGRES_USER: ot_user
      POSTGRES_PASSWORD: ot_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ot_user -d ot_at_home"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
